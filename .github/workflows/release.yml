name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install test dependencies
        run: python -m pip install -r requirements_test.txt
      - name: Run tests
        run: python -m pytest
      - name: Type-check (mypy --strict)
        run: python -m mypy --strict custom_components/samsung_ac_dplug

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to create the GitHub release
    steps:
      - uses: actions/checkout@v4
      - name: Check that the tag matches the manifest version
        run: |
          VER=$(python3 -c "import json;print(json.load(open('custom_components/samsung_ac_dplug/manifest.json'))['version'])")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VER" != "$TAG" ]; then
            echo "Tag $TAG does not match manifest version $VER"; exit 1
          fi
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          # Attach the provisioning helper as an asset so it downloads directly
          # (release assets are served as attachments) via
          # releases/latest/download/provision.py
          files: scripts/provision.py
